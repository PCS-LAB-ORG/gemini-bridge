# Semgrep OSS — SAST pattern matching, no Semgrep Cloud account required
# SEMGREP_APP_TOKEN explicitly empty = OSS mode, fully local to runner
# Results: GitHub Security tab via SARIF upload
name: Semgrep

on:
  push:
    branches: [develop, main]
  pull_request: {}

jobs:
  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Semgrep OSS
        run: |
          semgrep \
            --config=p/python \
            --config=p/secrets \
            --config=p/owasp-top-ten \
            --error \
            --sarif \
            --output=semgrep.sarif
        env:
          SEMGREP_APP_TOKEN: ""   # empty = OSS mode, no SaaS

      - uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: semgrep.sarif
        if: always()
