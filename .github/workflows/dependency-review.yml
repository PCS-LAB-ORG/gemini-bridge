# Dependency Review — blocks PRs that introduce new CVEs in dependencies
# GitHub-native, uses GitHub Advisory Database, no external auth
# Only runs on PRs (needs a base to compare against)
name: Dependency Review

on:
  pull_request:
    paths:
      - 'requirements*.txt'
      - 'pyproject.toml'
      - 'setup.cfg'
      - 'setup.py'

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
